<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass 3.0 Pro | Suno Technology</title>
    <style>
        /* --- Базовые настройки --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            cursor: crosshair;
        }

        /* --- Фон (Градиенты) --- */
        .background-art {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 0, 128, 0.8) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 191, 255, 0.8) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.6) 0%, transparent 50%);
            background-size: 200% 200%;
            animation: moveGradient 15s ease infinite alternate;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1;
        }

        .bg-text {
            font-size: 8vw; font-weight: 900; letter-spacing: -2px; text-align: center; line-height: 1.1;
            background: linear-gradient(90deg, #fff, #a0aec0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0.8;
        }

        /* --- Интерактивная Капля --- */
        #glass-lens {
            position: absolute; width: 350px; height: 350px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.1), 0 30px 60px rgba(0, 0, 0, 0.6);
            will-change: transform, border-radius; pointer-events: none; z-index: 100;
            animation: morph 6s ease-in-out infinite;
            transition: left 0.1s linear, top 0.1s linear;
            transform: translate(-50%, -50%); opacity: 0;
        }

        /* --- Главная шторка --- */
        #main-curtain {
            position: absolute; width: 100%; height: 100%;
            background: rgba(10, 12, 16, 0.5);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1), transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- UI Элементы на шторке --- */
        .ui-container {
            display: flex; flex-direction: column; align-items: center; height: 120px;
        }

        .btn-open {
            padding: 16px 32px; font-size: 18px; font-weight: 600;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px; color: white; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn-open:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

        .status-text {
            margin-top: 20px; font-family: monospace; font-size: 14px; letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7); text-transform: uppercase; height: 20px;
        }

        /* --- Анимация 1: Круговой лоадер --- */
        .loader-spinner {
            display: none; width: 50px; height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00bfff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* --- Анимация 2: Крест "X" (Отказ) --- */
        .loader-cross {
            display: none; position: relative; width: 60px; height: 60px;
        }
        .loader-cross .line {
            position: absolute; width: 100%; height: 4px;
            background: #ff3366; top: 50%; left: 0;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.8); border-radius: 2px;
        }
        .line1 { transform: translateY(-50%) rotate(45deg); }
        .line2 { transform: translateY(-50%) rotate(-45deg); }

        .shake-effect { animation: shakeError 0.4s ease-in-out; }
        .override-effect .line { background: #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.8); }

        /* --- Ключевые кадры --- */
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 70% 70% 30% / 30% 70% 30% 70%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* Состояние "Открыто" */
        body.is-open #main-curtain { opacity: 0; pointer-events: none; transform: scale(1.1); }
        body.is-open #glass-lens { opacity: 1; }
    </style>
</head>
<body>

    <div class="background-art">
        <div class="bg-text">SUNO<br>TECHNOLOGY</div>
        <div style="font-size: 1.5vw; color: rgba(255,255,255,0.5); margin-top: 20px;">Move your cursor to interact with Liquid Glass</div>
    </div>

    <div id="glass-lens"></div>

    <div id="main-curtain">
        <div class="ui-container">
            <button class="btn-open" id="btn-start" onclick="startSequence()">Connect to Server</button>
            <div class="loader-spinner" id="loader-1"></div>
            <div class="loader-cross" id="loader-2">
                <div class="line line1"></div>
                <div class="line line2"></div>
            </div>
        </div>
        <div class="status-text" id="status-text">System Standby</div>
    </div>

    <script>
        const lens = document.getElementById('glass-lens');
        const btnStart = document.getElementById('btn-start');
        const loader1 = document.getElementById('loader-1');
        const loader2 = document.getElementById('loader-2');
        const statusText = document.getElementById('status-text');
        let isOpen = false;

        // Сценарий анимаций
        function startSequence() {
            // 1. Прячем кнопку, запускаем круговой лоадер
            btnStart.style.display = 'none';
            loader1.style.display = 'block';
            statusText.innerText = 'Authenticating...';

            // 2. Через 2 секунды - выдаем ошибку (Крест X)
            setTimeout(() => {
                loader1.style.display = 'none';
                loader2.style.display = 'block';
                loader2.classList.add('shake-effect'); // Эффект тряски
                statusText.innerText = 'ACCESS DENIED';
                statusText.style.color = '#ff3366';
            }, 2000);

            // 3. Через 3.5 секунды - обход системы (Крест зеленеет)
            setTimeout(() => {
                loader2.classList.remove('shake-effect');
                loader2.classList.add('override-effect');
                statusText.innerText = 'ROOT OVERRIDE SUCCESSFUL';
                statusText.style.color = '#00ff88';
            }, 3500);

            // 4. Через 4.5 секунды - открываем шторку
            setTimeout(() => {
                document.body.classList.add('is-open');
                isOpen = true;
            }, 4500);
        }

        // Движение капли (60 FPS)
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            if(!isOpen) return;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.addEventListener('touchmove', (e) => {
            if(!isOpen) return;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: true });

        function animateLens() {
            if(isOpen) {
                lens.style.left = `${mouseX}px`;
                lens.style.top = `${mouseY}px`;
            }
            requestAnimationFrame(animateLens);
        }

        animateLens();
    </script>
</body>
</html>
